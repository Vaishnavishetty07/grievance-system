{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="form-card">
  <h2>Register</h2>
  <form method="POST" action="{{ url_for('auth.register') }}">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="Your full name" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="Your email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Create password" required>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select name="role" required>
        <option value="">-- Select Role --</option>
        <option value="Student">Student</option>
        <option value="Staff">Staff</option>
        <option value="Admin">Admin</option>
      </select>
    </div>
    <div class="form-group">
      <label>Hostel Block <span class="hint">(students only)</span></label>
      <input type="text" name="hostel_block" placeholder="e.g. Block A">
    </div>
    <div class="form-group">
      <label>Room Number <span class="hint">(students only)</span></label>
      <input type="text" name="room_number" placeholder="e.g. 204">
    </div>
    <button type="submit" class="btn-primary">Register</button>
  </form>
  <p class="form-footer">Already registered? <a href="{{ url_for('auth.login') }}">Login here</a></p>
</div>
{% endblock %}
