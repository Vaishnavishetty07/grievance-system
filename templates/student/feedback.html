{% extends 'base.html' %}
{% block title %}Give Feedback{% endblock %}
{% block content %}
<div class="form-card">
  <h2>Rate Your Experience</h2>
  <p>Complaint: <strong>{{ complaint.title }}</strong></p>
  <form method="POST">
    <div class="form-group">
      <label>Rating</label>
      <div class="star-rating">
        <select name="rating" required>
          <option value="5">⭐⭐⭐⭐⭐ — Excellent</option>
          <option value="4">⭐⭐⭐⭐ — Good</option>
          <option value="3" selected>⭐⭐⭐ — Average</option>
          <option value="2">⭐⭐ — Poor</option>
          <option value="1">⭐ — Very Poor</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Comments <span class="hint">(optional)</span></label>
      <textarea name="comment" rows="3" placeholder="Any additional comments..."></textarea>
    </div>
    <button type="submit" class="btn-primary">Submit Feedback</button>
  </form>
</div>
{% endblock %}
